name: Terraform Control
description: "Run terraform init/plan/apply/destroy with summarized outputs."

inputs:
  working-directory:
    description: "Directory containing Terraform configuration."
    required: true
  command:
    description: "Terraform command: plan, apply, destroy, validate, or fmt."
    required: false
    default: "plan"
  terraform-version:
    description: "Terraform version to install if not present (e.g. 1.6.6)."
    required: false
    default: ""
  init-args:
    description: "Additional args for terraform init."
    required: false
    default: ""
  plan-args:
    description: "Additional args for terraform plan."
    required: false
    default: ""
  apply-args:
    description: "Additional args for terraform apply."
    required: false
    default: ""
  destroy-args:
    description: "Additional args for terraform destroy."
    required: false
    default: ""
  validate-args:
    description: "Additional args for terraform validate."
    required: false
    default: ""
  fmt-args:
    description: "Additional args for terraform fmt -check."
    required: false
    default: ""
  run-fmt:
    description: "Run terraform fmt -check before the command."
    required: false
    default: "false"
  run-validate:
    description: "Run terraform validate before the command."
    required: false
    default: "false"
  validate-on-plan:
    description: "Run terraform validate before plan."
    required: false
    default: "true"
  checkov-enabled:
    description: "Run checkov scan before plan."
    required: false
    default: "true"
  checkov-framework:
    description: "Checkov framework to scan."
    required: false
    default: "terraform"
  checkov-var-file:
    description: "Optional Checkov var-file path (repo-relative)."
    required: false
    default: ".github/repo_config.tfvars"
  checkov-fail-severities:
    description: "Comma-separated list of Checkov severities that fail the run."
    required: false
    default: "CRITICAL,HIGH"
  comment-on-pr:
    description: "Post a PR comment for plan results."
    required: false
    default: "true"
  pr-number:
    description: "PR number to comment on when not running under pull_request."
    required: false
    default: ""
  auto-approve:
    description: "When true, add -auto-approve for apply/destroy."
    required: false
    default: "false"
  emit-full-plan:
    description: "When true, include full plan output in the action summary."
    required: false
    default: "false"
  emit-summary:
    description: "When true, include a structured summary in the action summary for plan/apply."
    required: false
    default: "true"
  emit-raw-plan:
    description: "When true, include the raw plan output in the action summary."
    required: false
    default: "true"
  summary-max-lines:
    description: "Maximum diff lines per resource in the summary."
    required: false
    default: "80"
  outputs-display:
    description: "Display Terraform outputs: all, changes_only, or nothing."
    required: false
    default: "changes_only"

outputs:
  plan_exit_code:
    description: "Exit code from terraform plan (0=clean,2=changes,1=error)."
    value: ${{ steps.plan.outputs.plan_exit_code }}
  plan_has_changes:
    description: "true when terraform plan detects changes."
    value: ${{ steps.plan.outputs.plan_has_changes }}
  plan_add:
    description: "Resources to add."
    value: ${{ steps.plan.outputs.plan_add }}
  plan_change:
    description: "Resources to change."
    value: ${{ steps.plan.outputs.plan_change }}
  plan_destroy:
    description: "Resources to destroy."
    value: ${{ steps.plan.outputs.plan_destroy }}
  plan_summary:
    description: "Plan summary string."
    value: ${{ steps.plan.outputs.plan_summary }}
  plan_file:
    description: "Absolute path to the plan file."
    value: ${{ steps.plan.outputs.plan_file }}
  plan_text_file:
    description: "Absolute path to the rendered plan text."
    value: ${{ steps.plan.outputs.plan_text_file }}
  plan_log_file:
    description: "Absolute path to the terraform plan log file."
    value: ${{ steps.plan.outputs.plan_log_file }}
  trace_file:
    description: "Absolute path to the Terraform trace log file (if generated)."
    value: ${{ steps.plan.outputs.trace_file }}
  apply_exit_code:
    description: "Exit code from terraform apply."
    value: ${{ steps.apply.outputs.apply_exit_code }}
  apply_log_file:
    description: "Absolute path to the terraform apply log file."
    value: ${{ steps.apply.outputs.apply_log_file }}

runs:
  using: "composite"
  steps:
    - name: Install Terraform
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.terraform-version }}"

        if [ -z "$version" ] && command -v terraform >/dev/null 2>&1; then
          terraform -version
          exit 0
        fi

        if [ -z "$version" ]; then
          echo "Terraform not found and terraform-version not provided." >&2
          exit 1
        fi

        archive="terraform_${version}_linux_amd64.zip"
        url="https://releases.hashicorp.com/terraform/${version}/${archive}"
        curl -fsSLo "$archive" "$url"
        unzip -o "$archive" -d "$RUNNER_TEMP/terraform-bin"
        export PATH="$RUNNER_TEMP/terraform-bin:$PATH"
        echo "$RUNNER_TEMP/terraform-bin" >> "$GITHUB_PATH"
        terraform -version

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        terraform init -input=false -no-color ${{ inputs.init-args }}

    - name: Terraform fmt
      if: ${{ inputs.command == 'fmt' || inputs.run-fmt == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        terraform fmt -check ${{ inputs.fmt-args }}

    - name: Terraform validate (pre-plan)
      if: ${{ inputs.command == 'plan' && inputs.validate-on-plan == 'true' }}
      id: validate
      continue-on-error: true
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        log_file="${RUNNER_TEMP:-/tmp}/terraform-validate.log"
        set +e
        terraform validate -no-color ${{ inputs.validate-args }} 2>&1 | tee "$log_file"
        exit_code=${PIPESTATUS[0]}
        set -e
        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "log_file=$log_file" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Terraform validate
      if: ${{ (inputs.command == 'validate' || inputs.run-validate == 'true') && inputs.command != 'plan' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        terraform validate -no-color ${{ inputs.validate-args }}

    - name: Install Checkov
      if: ${{ inputs.command == 'plan' && inputs.checkov-enabled == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install checkov

    - name: Checkov scan
      if: ${{ inputs.command == 'plan' && inputs.checkov-enabled == 'true' }}
      id: checkov
      continue-on-error: true
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        log_file="${RUNNER_TEMP:-/tmp}/checkov.json"
        repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
        var_file="${{ inputs.checkov-var-file }}"
        var_path="${repo_root}/${var_file}"
        set +e
        if [ -n "$var_file" ] && [ -f "$var_path" ]; then
          checkov -d "$(pwd)" --framework "${{ inputs.checkov-framework }}" --output json --var-file "$var_path" > "$log_file"
        else
          checkov -d "$(pwd)" --framework "${{ inputs.checkov-framework }}" --output json > "$log_file"
        fi
        exit_code=$?
        set -e
        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "log_file=$log_file" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Checkov gate
      if: ${{ inputs.command == 'plan' && inputs.checkov-enabled == 'true' }}
      id: checkov_gate
      shell: bash
      env:
        CHECKOV_JSON: ${{ steps.checkov.outputs.log_file }}
        FAIL_SEVERITIES: ${{ inputs.checkov-fail-severities }}
      run: |
        set -euo pipefail
        if [ -z "${CHECKOV_JSON:-}" ] || [ ! -f "$CHECKOV_JSON" ]; then
          echo "gate_failed=false" >> "$GITHUB_OUTPUT"
          echo "fail_severities=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        node <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require("fs");
        const path = process.env.CHECKOV_JSON;
        const failLevels = (process.env.FAIL_SEVERITIES || "")
          .split(",")
          .map((item) => item.trim().toUpperCase())
          .filter(Boolean);
        let data;
        try {
          data = JSON.parse(fs.readFileSync(path, "utf8"));
        } catch (error) {
          console.log("gate_failed=false");
          console.log("fail_severities=");
          process.exit(0);
        }
        const results = data && data.results ? data.results : data;
        const failed = Array.isArray(results.failed_checks) ? results.failed_checks : [];
        const matched = failed.filter((check) => {
          const raw = (check.severity || check.severity_level || "UNKNOWN");
          return failLevels.includes(String(raw).toUpperCase());
        });
        const gateFailed = matched.length > 0;
        process.stdout.write(`gate_failed=${gateFailed ? "true" : "false"}\n`);
        process.stdout.write(`fail_severities=${failLevels.join(",")}\n`);
        NODE

    - name: Terraform plan
      if: >-
        ${{ inputs.command == 'plan' &&
            (inputs.validate-on-plan != 'true' ||
             steps.validate.outputs.exit_code == '' ||
             steps.validate.outputs.exit_code == '0') }}
      id: plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        plan_file="$(pwd)/terraform.plan"
        plan_text_file="$(pwd)/terraform.plan.txt"
        plan_log_file="${RUNNER_TEMP:-/tmp}/terraform-plan.log"
        exit_code=0

        set +e
        terraform plan -no-color -input=false -detailed-exitcode -out="$plan_file" ${{ inputs.plan-args }} 2>&1 | tee "$plan_log_file"
        exit_code=${PIPESTATUS[0]}
        set -e

        has_changes="false"
        if [ "$exit_code" -eq 2 ]; then
          has_changes="true"
        fi

        add="0"
        change="0"
        destroy="0"

        if [ "$exit_code" -ne 1 ] && [ -f "$plan_file" ]; then
          terraform show -no-color "$plan_file" > "$plan_text_file"
          if command -v jq >/dev/null 2>&1; then
            counts=$(terraform show -json "$plan_file" | jq -r '
              [ .resource_changes[].change.actions ] | flatten
              | {
                  add: (map(select(. == "create")) | length),
                  change: (map(select(. == "update")) | length),
                  destroy: (map(select(. == "delete")) | length)
                }')
            add=$(jq -r '.add' <<< "$counts")
            change=$(jq -r '.change' <<< "$counts")
            destroy=$(jq -r '.destroy' <<< "$counts")
          fi
        fi

        summary="Add: ${add}, Change: ${change}, Destroy: ${destroy}"

        trace_file="${TF_LOG_PATH:-$RUNNER_TEMP/terraform-trace.log}"

        echo "plan_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "plan_has_changes=$has_changes" >> "$GITHUB_OUTPUT"
        echo "plan_add=$add" >> "$GITHUB_OUTPUT"
        echo "plan_change=$change" >> "$GITHUB_OUTPUT"
        echo "plan_destroy=$destroy" >> "$GITHUB_OUTPUT"
        echo "plan_summary=$summary" >> "$GITHUB_OUTPUT"
        echo "plan_file=$plan_file" >> "$GITHUB_OUTPUT"
        echo "plan_text_file=$plan_text_file" >> "$GITHUB_OUTPUT"
        echo "plan_log_file=$plan_log_file" >> "$GITHUB_OUTPUT"
        echo "trace_file=$trace_file" >> "$GITHUB_OUTPUT"

        if [ "$exit_code" -eq 1 ] && [ -z "${TF_LOG:-}" ]; then
          set +e
          TF_LOG=TRACE TF_LOG_PATH="$trace_file" terraform plan -no-color -input=false -detailed-exitcode -out="$plan_file" ${{ inputs.plan-args }}
          set -e
        fi

        exit 0

    - name: Terraform apply
      if: ${{ inputs.command == 'apply' }}
      id: apply
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        approve_flag=""
        if [ "${{ inputs.auto-approve }}" = "true" ]; then
          approve_flag="-auto-approve"
        fi
        apply_log_file="${RUNNER_TEMP:-/tmp}/terraform-apply.log"
        exit_code=0

        set +e
        terraform apply -no-color -input=false $approve_flag ${{ inputs.apply-args }} 2>&1 | tee "$apply_log_file"
        exit_code=${PIPESTATUS[0]}
        set -e

        echo "apply_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "apply_log_file=$apply_log_file" >> "$GITHUB_OUTPUT"

        exit "$exit_code"

    - name: Terraform summary
      if: ${{ always() && (inputs.command == 'plan' || inputs.command == 'apply') && inputs.emit-summary == 'true' }}
      id: summary
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND: ${{ inputs.command }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.plan_exit_code }}
        PLAN_HAS_CHANGES: ${{ steps.plan.outputs.plan_has_changes }}
        PLAN_ADD: ${{ steps.plan.outputs.plan_add }}
        PLAN_CHANGE: ${{ steps.plan.outputs.plan_change }}
        PLAN_DESTROY: ${{ steps.plan.outputs.plan_destroy }}
        PLAN_TEXT_FILE: ${{ steps.plan.outputs.plan_text_file }}
        PLAN_LOG_FILE: ${{ steps.plan.outputs.plan_log_file }}
        APPLY_OUTCOME: ${{ steps.apply.outcome }}
        APPLY_EXIT_CODE: ${{ steps.apply.outputs.apply_exit_code }}
        APPLY_LOG_FILE: ${{ steps.apply.outputs.apply_log_file }}
        VALIDATE_EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
        VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        VALIDATE_LOG_FILE: ${{ steps.validate.outputs.log_file }}
        CHECKOV_ENABLED: ${{ inputs.checkov-enabled }}
        VALIDATE_ON_PLAN: ${{ inputs.validate-on-plan }}
        CHECKOV_EXIT_CODE: ${{ steps.checkov.outputs.exit_code }}
        CHECKOV_OUTCOME: ${{ steps.checkov.outcome }}
        CHECKOV_LOG_FILE: ${{ steps.checkov.outputs.log_file }}
        CHECKOV_GATE_FAILED: ${{ steps.checkov_gate.outputs.gate_failed }}
        CHECKOV_GATE_SEVERITIES: ${{ steps.checkov_gate.outputs.fail_severities }}
        EMIT_RAW_PLAN: ${{ inputs.emit-raw-plan }}
        EMIT_FULL_PLAN: ${{ inputs.emit-full-plan }}
        SUMMARY_MAX_LINES: ${{ inputs.summary-max-lines }}
      run: |
        set -euo pipefail

        command="${COMMAND:-plan}"
        working_dir="${WORKING_DIRECTORY:-.}"
        plan_add="${PLAN_ADD:-}"
        plan_change="${PLAN_CHANGE:-}"
        plan_destroy="${PLAN_DESTROY:-}"
        plan_exit_code="${PLAN_EXIT_CODE:-}"
        plan_has_changes="${PLAN_HAS_CHANGES:-}"
        plan_text_file="${PLAN_TEXT_FILE:-}"
        plan_log_file="${PLAN_LOG_FILE:-}"
        apply_outcome="${APPLY_OUTCOME:-}"
        apply_exit_code="${APPLY_EXIT_CODE:-}"
        apply_log_file="${APPLY_LOG_FILE:-}"
        emit_raw_plan="${EMIT_RAW_PLAN:-true}"
        if [ "${EMIT_FULL_PLAN:-false}" = "true" ]; then
          emit_raw_plan="true"
        fi
        max_lines_per_resource="${SUMMARY_MAX_LINES:-80}"
        max_log_chars=30000

        summary_file="${RUNNER_TEMP:-/tmp}/terraform-summary.md"
        comment_file="${RUNNER_TEMP:-/tmp}/terraform-comment.md"
        : > "$summary_file"
        : > "$comment_file"

        path_label="$working_dir"
        if [ -z "$path_label" ] || [ "$path_label" = "." ]; then
          path_label="root"
        fi
        comment_slug="$(printf '%s' "$path_label" | tr '/\\' '-' | tr -c 'A-Za-z0-9._-' '-' | tr -s '-')"
        comment_marker="<!-- terraform-plan:${comment_slug} -->"
        run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

        validate_exit="${VALIDATE_EXIT_CODE:-}"
        validate_outcome="${VALIDATE_OUTCOME:-}"
        validate_log="${VALIDATE_LOG_FILE:-}"
        validate_on_plan="${VALIDATE_ON_PLAN:-true}"
        validate_status="skipped"
        validate_icon=":fast_forward:"
        validate_detail="skipped"
        if [ "$command" = "plan" ] && [ "$validate_on_plan" = "true" ] && { [ -n "$validate_exit" ] || [ -n "$validate_outcome" ]; }; then
          if [ "$validate_exit" = "0" ] || [ "$validate_outcome" = "success" ]; then
            validate_status="passed"
            validate_icon=":heavy_check_mark:"
            validate_detail="required"
          else
            validate_status="failed"
            validate_icon=":x:"
            validate_detail="required"
          fi
        fi

        checkov_enabled="${CHECKOV_ENABLED:-false}"
        checkov_exit="${CHECKOV_EXIT_CODE:-}"
        checkov_outcome="${CHECKOV_OUTCOME:-}"
        checkov_log="${CHECKOV_LOG_FILE:-}"
        checkov_gate_failed="${CHECKOV_GATE_FAILED:-false}"
        checkov_gate_severities="${CHECKOV_GATE_SEVERITIES:-}"
        checkov_status="skipped"
        checkov_icon=":fast_forward:"
        checkov_detail="disabled"
        show_checks_table="false"
        checkov_summary_file="${RUNNER_TEMP:-/tmp}/checkov-summary.md"
        checkov_comment_file="${RUNNER_TEMP:-/tmp}/checkov-comment.txt"
        : > "$checkov_summary_file"
        : > "$checkov_comment_file"

        if [ "$command" = "plan" ] && { [ "$validate_on_plan" = "true" ] || [ "$checkov_enabled" = "true" ]; }; then
          show_checks_table="true"
        fi

        if [ "$command" = "plan" ] && [ "$checkov_enabled" = "true" ]; then
          checkov_detail="advisory"
          if [ -n "$checkov_log" ] && [ -f "$checkov_log" ]; then
            CHECKOV_LOG_FILE="$checkov_log" CHECKOV_SUMMARY_FILE="$checkov_summary_file" CHECKOV_COMMENT_FILE="$checkov_comment_file" node <<'NODE'
            const fs = require("fs");
            const logPath = process.env.CHECKOV_LOG_FILE;
            const summaryPath = process.env.CHECKOV_SUMMARY_FILE;
            const commentPath = process.env.CHECKOV_COMMENT_FILE;
            if (!logPath || !fs.existsSync(logPath)) {
              process.exit(0);
            }
            let data;
            try {
              data = JSON.parse(fs.readFileSync(logPath, "utf8"));
            } catch (error) {
              fs.writeFileSync(summaryPath, "Unable to parse Checkov JSON output.");
              fs.writeFileSync(commentPath, "parse_error");
              process.exit(0);
            }
            const results = data && data.results ? data.results : data;
            const failed = Array.isArray(results.failed_checks) ? results.failed_checks : [];
            const passed = Array.isArray(results.passed_checks) ? results.passed_checks : [];
            const skipped = Array.isArray(results.skipped_checks) ? results.skipped_checks : [];
            const severityOrder = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"];
            const countSeverities = (checks) => {
              const counts = { CRITICAL: 0, HIGH: 0, MEDIUM: 0, LOW: 0, INFO: 0, UNKNOWN: 0 };
              (checks || []).forEach((check) => {
                const raw = (check.severity || check.severity_level || "UNKNOWN");
                const key = counts.hasOwnProperty(String(raw).toUpperCase()) ? String(raw).toUpperCase() : "UNKNOWN";
                counts[key] += 1;
              });
              return counts;
            };
            const failedCounts = countSeverities(failed);
            const passedCounts = countSeverities(passed);
            const skippedCounts = countSeverities(skipped);
            const lines = [
              "| Severity | Passed | Failed | Skipped |",
              "| --- | --- | --- | --- |",
            ];
            severityOrder.forEach((level) => {
              lines.push(`| ${level} | ${passedCounts[level]} | ${failedCounts[level]} | ${skippedCounts[level]} |`);
            });
            let details = [];
            if (failed.length) {
              const limit = 50;
              details.push("");
              details.push("<details>");
              details.push("<summary>Failed checks</summary>");
              details.push("");
              failed.slice(0, limit).forEach((check) => {
                const id = String(check.check_id || "UNKNOWN").trim();
                const name = String(check.check_name || "Unnamed check").trim();
                const severity = String(check.severity || check.severity_level || "UNKNOWN").toUpperCase();
                const resource = String(check.resource || "n/a").trim();
                details.push(`- ${id} (${severity}) - ${name} - ${resource}`);
              });
              if (failed.length > limit) {
                details.push(`- ... (${failed.length - limit} more)`);
              }
              details.push("</details>");
            }
            if (skipped.length) {
              details.push("");
              details.push("<details>");
              details.push("<summary>Skipped checks</summary>");
              details.push("");
              skipped.slice(0, 25).forEach((check) => {
                const id = String(check.check_id || "UNKNOWN").trim();
                const name = String(check.check_name || "Unnamed check").trim();
                details.push(`- ${id} - ${name}`);
              });
              if (skipped.length > 25) {
                details.push(`- ... (${skipped.length - 25} more)`);
              }
              details.push("</details>");
            }
            fs.writeFileSync(summaryPath, lines.concat(details).join("\n") + "\n");
            const commentLine = severityOrder.map((level) => `${level}:${failedCounts[level]}`).join(" ");
            fs.writeFileSync(commentPath, commentLine + "\n");
        NODE
          fi
          counts_line="$(tr -d '\n' < "$checkov_comment_file" 2>/dev/null || true)"
          if [ -n "$counts_line" ] && [ "$counts_line" != "parse_error" ]; then
            checkov_detail="$counts_line"
          elif [ "$counts_line" = "parse_error" ]; then
            checkov_detail="parse_error"
          fi
          if [ "$checkov_gate_failed" = "true" ]; then
            checkov_status="failed"
            checkov_icon=":x:"
            if [ -n "$checkov_gate_severities" ]; then
              checkov_detail="blocked (${checkov_gate_severities})${checkov_detail:+ - ${checkov_detail}}"
            else
              checkov_detail="blocked${checkov_detail:+ - ${checkov_detail}}"
            fi
          elif [ -n "$checkov_exit" ] && [ "$checkov_exit" != "0" ]; then
            checkov_status="failures"
            checkov_icon=":warning:"
            checkov_detail="${checkov_detail:-advisory}"
          else
            checkov_status="passed"
            checkov_icon=":heavy_check_mark:"
            checkov_detail="${checkov_detail:-advisory}"
          fi
        fi

        if [ -z "$plan_text_file" ] || [ ! -f "$plan_text_file" ]; then
          if [ -f "terraform.plan.txt" ]; then
            plan_text_file="$(pwd)/terraform.plan.txt"
          fi
        fi

        if [ -z "$plan_text_file" ] || [ ! -f "$plan_text_file" ]; then
          if [ -f "terraform.plan" ]; then
            terraform show -no-color "terraform.plan" > "terraform.plan.txt" || true
            if [ -f "terraform.plan.txt" ]; then
              plan_text_file="$(pwd)/terraform.plan.txt"
            fi
          fi
        fi

        if [ -f "$plan_text_file" ]; then
          plan_line="$(grep -E 'Plan: [0-9]+ to add, [0-9]+ to change, [0-9]+ to destroy\\.' "$plan_text_file" | tail -n 1 || true)"
          if [ -n "$plan_line" ]; then
            plan_add="$(printf '%s' "$plan_line" | sed -E 's/.*Plan: ([0-9]+) to add, ([0-9]+) to change, ([0-9]+) to destroy.*/\\1/')"
            plan_change="$(printf '%s' "$plan_line" | sed -E 's/.*Plan: ([0-9]+) to add, ([0-9]+) to change, ([0-9]+) to destroy.*/\\2/')"
            plan_destroy="$(printf '%s' "$plan_line" | sed -E 's/.*Plan: ([0-9]+) to add, ([0-9]+) to change, ([0-9]+) to destroy.*/\\3/')"
          fi
        fi

        plan_add="${plan_add:-?}"
        plan_change="${plan_change:-?}"
        plan_destroy="${plan_destroy:-?}"

        if [ "$command" = "plan" ]; then
          header="### Terraform plan"
          has_plan_summary="false"
          has_errors="false"
          if [ -f "$plan_text_file" ]; then
            if grep -q 'Plan:' "$plan_text_file"; then
              has_plan_summary="true"
            fi
            if grep -q '^Error:' "$plan_text_file"; then
              if grep -v '^Error: Process completed with exit code' "$plan_text_file" | grep -q '^Error:'; then
                has_errors="true"
              fi
            fi
          fi
          if [ "$validate_status" = "failed" ]; then
            status_line=":x: Terraform plan - blocked (validation failed)"
          elif [ "$plan_has_changes" = "true" ] || { [ "$plan_exit_code" = "1" ] && [ "$has_plan_summary" = "true" ] && [ "$has_errors" = "false" ]; }; then
            status_line=":heavy_check_mark: Terraform plan - changes detected (required)"
          elif [ "$plan_exit_code" = "1" ]; then
            status_line=":x: Terraform plan - failed (required)"
          else
            status_line=":heavy_check_mark: Terraform plan - no changes (required)"
          fi
        else
          header="### Terraform apply"
          if [ "$apply_outcome" = "failure" ] || { [ -n "$apply_exit_code" ] && [ "$apply_exit_code" != "0" ]; }; then
            status_line=":x: Terraform apply - failed"
          else
            status_line=":heavy_check_mark: Terraform apply - completed"
          fi
        fi

        apply_changes_file="${RUNNER_TEMP:-/tmp}/terraform-apply-changes.md"
        apply_errors_file="${RUNNER_TEMP:-/tmp}/terraform-apply-errors.md"
        apply_counts_file="${RUNNER_TEMP:-/tmp}/terraform-apply-counts.txt"
        apply_applied="0"
        apply_failed="0"

        if [ "$command" = "apply" ]; then
          if [ -z "$apply_log_file" ] || [ ! -f "$apply_log_file" ]; then
            if [ -f "${RUNNER_TEMP:-/tmp}/terraform-apply.log" ]; then
              apply_log_file="${RUNNER_TEMP:-/tmp}/terraform-apply.log"
            elif [ -f "terraform-apply.log" ]; then
              apply_log_file="$(pwd)/terraform-apply.log"
            fi
          fi

          if [ -n "$apply_log_file" ] && [ -f "$apply_log_file" ]; then
            APPLY_LOG_FILE="$apply_log_file" APPLY_CHANGES_FILE="$apply_changes_file" APPLY_ERRORS_FILE="$apply_errors_file" APPLY_COUNTS_FILE="$apply_counts_file" MAX_LINES="$max_lines_per_resource" node <<'NODE'
            const fs = require("fs");
            const logPath = process.env.APPLY_LOG_FILE;
            const changesPath = process.env.APPLY_CHANGES_FILE;
            const errorsPath = process.env.APPLY_ERRORS_FILE;
            const countsPath = process.env.APPLY_COUNTS_FILE;
            const maxLines = Math.max(parseInt(process.env.MAX_LINES || "80", 10), 1);

            const writeFile = (path, content) => {
              if (path) {
                fs.writeFileSync(path, content);
              }
            };

            if (!logPath || !fs.existsSync(logPath)) {
              writeFile(changesPath, "");
              writeFile(errorsPath, "");
              writeFile(countsPath, "applied=0\nfailed=0\n");
              process.exit(0);
            }

            const raw = fs.readFileSync(logPath, "utf8");
            const lines = raw.split(/\r?\n/);
            const allowed = /^(Creating|Modifying|Destroying|Recreating|Creation complete|Modifications complete|Destruction complete|Recreation complete|Still creating|Still modifying|Still destroying|Reading|Read complete|Refreshing state|Refresh complete)/;

            const resourceLines = new Map();
            const resourceOrder = [];
            const errorBlocks = new Map();
            const errorOrder = [];

            const escapeHtml = (value) => {
              return value
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            };

            const addResourceLine = (address, line) => {
              if (!resourceLines.has(address)) {
                resourceLines.set(address, []);
                resourceOrder.push(address);
              }
              resourceLines.get(address).push(line);
            };

            lines.forEach((line) => {
              const match = line.match(/^([^\s].*?):\s+(.*)$/);
              if (!match) {
                return;
              }
              const address = match[1].trim();
              const message = match[2].trim();
              if (!allowed.test(message)) {
                return;
              }
              addResourceLine(address, line);
            });

            let currentError = null;
            const flushError = () => {
              if (!currentError || currentError.length === 0) {
                return;
              }
              let address = "apply error";
              for (const line of currentError) {
                const match = line.match(/^\s*with\s+([^,]+),/);
                if (match) {
                  address = match[1].trim();
                  break;
                }
              }
              if (!errorBlocks.has(address)) {
                errorBlocks.set(address, []);
                errorOrder.push(address);
              }
              errorBlocks.get(address).push(currentError);
              currentError = null;
            };

            lines.forEach((line) => {
              if (line.startsWith("Error:")) {
                flushError();
                currentError = [line];
                return;
              }
              if (currentError) {
                currentError.push(line);
              }
            });
            flushError();

            const renderDetails = (icon, address, contentLines) => {
              let linesToShow = contentLines.slice();
              let truncated = false;
              if (linesToShow.length > maxLines) {
                linesToShow = linesToShow.slice(0, maxLines);
                truncated = true;
              }
              let body = linesToShow.join("\n").trim();
              if (!body) {
                body = "(no apply output captured)";
              }
              if (truncated) {
                body += `\n\n... (${contentLines.length - maxLines} more lines)`;
              }
              return [
                "<details>",
                `<summary>${icon} ${address}</summary>`,
                "<pre>",
                escapeHtml(body),
                "</pre>",
                "</details>",
                "",
              ].join("\n");
            };

            const failedSet = new Set(errorOrder);
            const successAddresses = resourceOrder.filter((address) => !failedSet.has(address));

            const successOutput = successAddresses
              .map((address) => renderDetails(":heavy_minus_sign:", address, resourceLines.get(address) || []))
              .join("\n");

            const errorOutput = errorOrder
              .map((address) => {
                const blocks = errorBlocks.get(address) || [];
                const flattened = [];
                blocks.forEach((block, index) => {
                  if (index > 0) {
                    flattened.push("");
                  }
                  flattened.push(...block);
                });
                return renderDetails(":x:", address, flattened);
              })
              .join("\n");

            writeFile(changesPath, successOutput ? successOutput + "\n" : "");
            writeFile(errorsPath, errorOutput ? errorOutput + "\n" : "");
            writeFile(countsPath, `applied=${successAddresses.length}\nfailed=${errorOrder.length}\n`);
        NODE
          fi

          if [ -f "$apply_counts_file" ]; then
            apply_applied="$(grep -E '^applied=' "$apply_counts_file" | head -n 1 | cut -d= -f2)"
            apply_failed="$(grep -E '^failed=' "$apply_counts_file" | head -n 1 | cut -d= -f2)"
          fi
          apply_applied="${apply_applied:-0}"
          apply_failed="${apply_failed:-0}"
        fi

        {
          echo "$header"
          echo ""
          echo "$status_line"
          echo ""
          if [ "$command" = "plan" ] && [ "$show_checks_table" = "true" ]; then
            echo "| Check | Status | Details |"
            echo "| --- | --- | --- |"
            echo "| Terraform validate | ${validate_icon} ${validate_status} | ${validate_detail} |"
            echo "| Checkov scan | ${checkov_icon} ${checkov_status} | ${checkov_detail} |"
            echo ""
          fi
          if [ "$command" = "plan" ]; then
            echo "| Add | Change | Destroy |"
            echo "| --- | --- | --- |"
            echo "| ${plan_add} | ${plan_change} | ${plan_destroy} |"
          else
            echo "| Applied | Failed |"
            echo "| --- | --- |"
            echo "| ${apply_applied} | ${apply_failed} |"
          fi
        } >> "$summary_file"

        if [ "$command" = "plan" ]; then
          {
            echo "${comment_marker}"
            echo "### Terraform plan (${path_label})"
            echo ""
            echo "$status_line"
            echo ""
            if [ "$show_checks_table" = "true" ]; then
              echo "| Check | Status | Details |"
              echo "| --- | --- | --- |"
              echo "| Terraform validate | ${validate_icon} ${validate_status} | ${validate_detail} |"
              echo "| Checkov scan | ${checkov_icon} ${checkov_status} | ${checkov_detail} |"
              echo ""
            fi
            echo "| Add | Change | Destroy |"
            echo "| --- | --- | --- |"
            echo "| ${plan_add} | ${plan_change} | ${plan_destroy} |"
            echo ""
            echo "Run: [${GITHUB_RUN_ID}](${run_url})"
          } >> "$comment_file"
        fi

        if [ "$command" = "apply" ]; then
          apply_error_excerpt=""
          if [ -n "$apply_log_file" ] && [ -f "$apply_log_file" ]; then
            apply_log_excerpt="${RUNNER_TEMP:-/tmp}/terraform-apply-error.log"
            log_size=$(wc -c < "$apply_log_file" | tr -d ' ')
            if [ "$log_size" -gt "$max_log_chars" ]; then
              head -c "$max_log_chars" "$apply_log_file" > "$apply_log_excerpt"
              printf "\n\n...truncated (%s chars)\n" "$log_size" >> "$apply_log_excerpt"
            else
              cp "$apply_log_file" "$apply_log_excerpt"
            fi
            apply_error_excerpt="$apply_log_excerpt"
          fi

          {
            echo ""
            if [ -s "$apply_errors_file" ]; then
              echo "### Apply failures"
              echo ""
              cat "$apply_errors_file"
            elif [ -n "$apply_error_excerpt" ] && [ -f "$apply_error_excerpt" ] && { [ -n "$apply_exit_code" ] && [ "$apply_exit_code" != "0" ]; }; then
              echo "### Apply failures"
              echo ""
              echo "<details>"
              echo "<summary>:x: apply error</summary>"
              echo ""
              echo '```'
              cat "$apply_error_excerpt"
              echo '```'
              echo "</details>"
              echo ""
            fi
            echo "### Applied resources"
            echo ""
            if [ -s "$apply_changes_file" ]; then
              cat "$apply_changes_file"
            else
              echo "_No applied resources detected._"
            fi
          } >> "$summary_file"

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          echo "comment_file=$comment_file" >> "$GITHUB_OUTPUT"
          echo "comment_marker=$comment_marker" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$command" = "plan" ] && [ "$validate_status" = "failed" ] && [ -n "$validate_log" ] && [ -f "$validate_log" ]; then
          {
            echo ""
            echo "<details>"
            echo "<summary>Terraform validate output</summary>"
            echo ""
            echo '```'
            cat "$validate_log"
            echo '```'
            echo "</details>"
          } >> "$summary_file"
        fi

        plan_error_excerpt=""
        if [ -n "$plan_log_file" ] && [ -f "$plan_log_file" ]; then
          plan_log_excerpt="${RUNNER_TEMP:-/tmp}/terraform-plan-error.log"
          log_size=$(wc -c < "$plan_log_file" | tr -d ' ')
          if [ "$log_size" -gt "$max_log_chars" ]; then
            head -c "$max_log_chars" "$plan_log_file" > "$plan_log_excerpt"
            printf "\n\n...truncated (%s chars)\n" "$log_size" >> "$plan_log_excerpt"
          else
            cp "$plan_log_file" "$plan_log_excerpt"
          fi
          plan_error_excerpt="$plan_log_excerpt"
        fi

        if [ "$command" = "plan" ] && [ "$plan_exit_code" = "1" ] && [ -n "$plan_error_excerpt" ] && [ -f "$plan_error_excerpt" ]; then
          {
            echo ""
            echo "<details>"
            echo "<summary>Terraform plan error output</summary>"
            echo ""
            echo '```'
            cat "$plan_error_excerpt"
            echo '```'
            echo "</details>"
          } >> "$summary_file"
          {
            echo ""
            echo "<details>"
            echo "<summary>Terraform plan error output</summary>"
            echo ""
            echo '```'
            cat "$plan_error_excerpt"
            echo '```'
            echo "</details>"
          } >> "$comment_file"
        fi

        if [ "$command" = "plan" ] && [ -s "$checkov_summary_file" ]; then
          {
            echo ""
            echo "### Checkov scan"
            echo ""
            cat "$checkov_summary_file"
          } >> "$summary_file"
        fi

        if [ ! -f "$plan_text_file" ]; then
          {
            echo ""
            echo "_Plan output not available._"
          } >> "$summary_file"
          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          echo "comment_file=$comment_file" >> "$GITHUB_OUTPUT"
          echo "comment_marker=$comment_marker" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        warnings_file="${RUNNER_TEMP:-/tmp}/terraform-warnings.txt"
        awk '
          BEGIN { in_warning = 0 }
          /^Warning:/ {
            if (in_warning) print ""
            in_warning = 1
          }
          in_warning { print }
          in_warning && NF == 0 { in_warning = 0 }
        ' "$plan_text_file" > "$warnings_file"

        if [ -s "$warnings_file" ]; then
          {
            echo ""
            echo "### Warnings"
            echo ""
            echo "<details>"
            echo "<summary>Terraform warnings</summary>"
            echo ""
            echo '```'
            cat "$warnings_file"
            echo '```'
            echo "</details>"
          } >> "$summary_file"
        fi

        resource_details="${RUNNER_TEMP:-/tmp}/terraform-resource-changes.md"
        drift_details="${RUNNER_TEMP:-/tmp}/terraform-resource-drift.md"
        : > "$resource_details"
        : > "$drift_details"
        awk -v plan_out="$resource_details" -v drift_out="$drift_details" -v max_lines="$max_lines_per_resource" '
          function action_for(header) {
            if (header ~ /will be created/) return "add"
            if (header ~ /will be updated in-place/) return "update"
            if (header ~ /will be read during apply/) return "read"
            if (header ~ /must be replaced/ || header ~ /will be replaced/) return "replace"
            if (header ~ /will be destroyed/) return "remove"
            if (header ~ /has been created/) return "add"
            if (header ~ /has been updated/ || header ~ /has been changed/) return "update"
            if (header ~ /has been deleted/) return "remove"
            return "unknown"
          }
          function icon_for(action) {
            if (action == "add") return ":green_circle:"
            if (action == "update") return ":yellow_circle:"
            if (action == "replace") return ":orange_circle:"
            if (action == "remove") return ":red_circle:"
            if (action == "read") return ":blue_circle:"
            return ":grey_question:"
          }
          function address_for(header, addr) {
            addr = header
            sub(/ will be created.*/, "", addr)
            sub(/ will be updated in-place.*/, "", addr)
            sub(/ will be read during apply.*/, "", addr)
            sub(/ must be replaced.*/, "", addr)
            sub(/ will be replaced.*/, "", addr)
            sub(/ will be destroyed.*/, "", addr)
            sub(/ has been created.*/, "", addr)
            sub(/ has been updated.*/, "", addr)
            sub(/ has been changed.*/, "", addr)
            sub(/ has been deleted.*/, "", addr)
            gsub(/[[:space:]]+$/, "", addr)
            return addr
          }
          function escape_html(s) {
            gsub(/&/, "\\&amp;", s)
            gsub(/</, "\\&lt;", s)
            gsub(/>/, "\\&gt;", s)
            return s
          }
          function reset_block() {
            header=""
            block=""
            line_count=0
            total_lines=0
            truncated=0
            current_out=""
          }
          function add_line(line) {
            total_lines++
            if (line_count < max_lines) {
              if (block == "") {
                block = line
              } else {
                block = block "\n" line
              }
              line_count++
            } else {
              truncated=1
            }
          }
          function flush() {
            if (header != "" && current_out != "") {
              print "<details>" >> current_out
              print "<summary>" icon_for(action_for(header)) " " address_for(header) "</summary>" >> current_out
              print "<pre>" >> current_out
              if (block != "") {
                print escape_html(block) >> current_out
              } else {
                print "(no attribute changes detected)" >> current_out
              }
              if (truncated) {
                print "\n... (" (total_lines - max_lines) " more lines)" >> current_out
              }
              print "</pre>" >> current_out
              print "</details>" >> current_out
              print "" >> current_out
            }
            reset_block()
          }
          BEGIN {
            mode=""
            if (max_lines == "" || max_lines <= 0) max_lines=80
            reset_block()
          }
          /^Note: Objects have changed outside of Terraform/ { if (mode != "drift") { flush(); mode="drift" } }
          /^Terraform detected the following changes made outside of Terraform/ { if (mode != "drift") { flush(); mode="drift" } }
          /^Terraform used the selected providers/ { if (mode == "drift") { flush(); mode="" } }
          /^Terraform will perform the following actions:/ { if (mode != "plan") { flush(); mode="plan" } }
          /^Plan:|^Changes to Outputs:|^No changes\\./ { flush(); exit }
          /^[[:space:]]*# / {
            if (mode == "") { next }
            candidate=$0
            sub(/^[[:space:]]*# /, "", candidate)
            if (candidate ~ /^[(]/) { next }
            flush()
            header=candidate
            current_out=(mode == "drift" ? drift_out : plan_out)
            next
          }
          {
            if (header != "") {
              add_line($0)
            }
          }
          END { flush() }
        ' "$plan_text_file"

        {
          echo ""
          echo "### Drift detected"
          echo ""
          if [ -s "$drift_details" ]; then
            cat "$drift_details"
          else
            echo "_No drift detected._"
          fi
        } >> "$summary_file"

        {
          echo ""
          echo "### Resource changes"
          echo ""
          if [ -s "$resource_details" ]; then
            cat "$resource_details"
          elif [ "$plan_has_changes" != "true" ]; then
            echo "_No planned resource changes._"
          else
            echo "_Resource changes summary unavailable._"
          fi
        } >> "$summary_file"

        if [ "$emit_raw_plan" = "true" ]; then
          {
            echo ""
            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>RAW Plan Output</summary>"
            echo ""
            echo '```'
            cat "$plan_text_file"
            echo '```'
            echo "</details>"
          } >> "$summary_file"
        fi

        cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
        echo "comment_file=$comment_file" >> "$GITHUB_OUTPUT"
        echo "comment_marker=$comment_marker" >> "$GITHUB_OUTPUT"

    - name: Terraform PR comment
      if: ${{ always() && inputs.command == 'plan' && inputs.comment-on-pr == 'true' }}
      uses: actions/github-script@v7
      env:
        COMMENT_FILE: ${{ steps.summary.outputs.comment_file }}
        COMMENT_MARKER: ${{ steps.summary.outputs.comment_marker }}
        PR_NUMBER: ${{ inputs.pr-number }}
      with:
        script: |
          const fs = require("fs");
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const prNumberInput = process.env.PR_NUMBER;
          let issue_number = null;
          let pr = null;
          if (prNumberInput) {
            issue_number = Number(prNumberInput);
          } else if (context.payload.pull_request) {
            pr = context.payload.pull_request;
            issue_number = pr.number;
          }
          if (!issue_number) {
            core.info("No PR context or PR number; skipping comment.");
            return;
          }

          if (!pr) {
            const response = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issue_number,
            });
            pr = response.data;
          }
          const isFork = pr.head.repo.full_name !== `${owner}/${repo}`;
          if (isFork) {
            core.info("Skipping PR comment for forked PR.");
            return;
          }

          const commentFile = process.env.COMMENT_FILE;
          if (!commentFile || !fs.existsSync(commentFile)) {
            core.info("Comment body file missing; skipping.");
            return;
          }

          const marker = process.env.COMMENT_MARKER || "<!-- terraform-plan -->";
          let body = fs.readFileSync(commentFile, "utf8").trim();
          if (!body.includes(marker)) {
            body = `${marker}\n${body}`;
          }

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existing = comments.find((comment) => (comment.body || "").includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }

    - name: Fail if prechecks or plan failed
      if: ${{ always() && inputs.command == 'plan' }}
      shell: bash
      env:
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.plan_exit_code }}
        VALIDATE_EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
        CHECKOV_GATE_FAILED: ${{ steps.checkov_gate.outputs.gate_failed }}
        CHECKOV_ENABLED: ${{ inputs.checkov-enabled }}
        VALIDATE_ON_PLAN: ${{ inputs.validate-on-plan }}
      run: |
        set -euo pipefail
        plan_exit="${PLAN_EXIT_CODE:-}"
        validate_exit="${VALIDATE_EXIT_CODE:-}"
        checkov_gate="${CHECKOV_GATE_FAILED:-false}"
        checkov_enabled="${CHECKOV_ENABLED:-false}"
        validate_on_plan="${VALIDATE_ON_PLAN:-true}"

        if [ "$validate_on_plan" = "true" ] && [ -n "$validate_exit" ] && [ "$validate_exit" != "0" ]; then
          echo "Terraform validate failed."
          exit 1
        fi

        if [ "$checkov_enabled" = "true" ] && [ "$checkov_gate" = "true" ]; then
          echo "Checkov findings exceeded configured thresholds."
          exit 1
        fi

        if [ "$plan_exit" = "1" ]; then
          echo "Terraform plan failed."
          exit 1
        fi

        exit 0

    - name: Terraform destroy
      if: ${{ inputs.command == 'destroy' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        approve_flag=""
        if [ "${{ inputs.auto-approve }}" = "true" ]; then
          approve_flag="-auto-approve"
        fi
        terraform destroy -no-color -input=false $approve_flag ${{ inputs.destroy-args }}

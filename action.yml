name: Terraform Control
description: "Run terraform init/plan/apply/destroy with summarized outputs."

inputs:
  working-directory:
    description: "Directory containing Terraform configuration."
    required: true
  command:
    description: "Terraform command: plan, apply, destroy, validate, or fmt."
    required: false
    default: "plan"
  terraform-version:
    description: "Terraform version to install if not present (e.g. 1.7.5)."
    required: false
    default: ""
  init-args:
    description: "Additional args for terraform init."
    required: false
    default: ""
  plan-args:
    description: "Additional args for terraform plan."
    required: false
    default: ""
  apply-args:
    description: "Additional args for terraform apply."
    required: false
    default: ""
  destroy-args:
    description: "Additional args for terraform destroy."
    required: false
    default: ""
  validate-args:
    description: "Additional args for terraform validate."
    required: false
    default: ""
  fmt-args:
    description: "Additional args for terraform fmt -check."
    required: false
    default: ""
  run-fmt:
    description: "Run terraform fmt -check before the command."
    required: false
    default: "false"
  run-validate:
    description: "Run terraform validate before the command."
    required: false
    default: "false"
  validate-on-plan:
    description: "Run terraform validate before plan."
    required: false
    default: "true"
  checkov-enabled:
    description: "Run checkov scan before plan."
    required: false
    default: "true"
  checkov-framework:
    description: "Checkov framework to scan."
    required: false
    default: "terraform"
  checkov-var-file:
    description: "Optional Checkov var-file path (repo-relative)."
    required: false
    default: ".github/repo_config.tfvars"
  checkov-fail-severities:
    description: "Comma-separated list of Checkov severities that fail the run."
    required: false
    default: "CRITICAL,HIGH"
  comment-on-pr:
    description: "Post a PR comment for plan results."
    required: false
    default: "true"
  pr-number:
    description: "PR number to comment on when not running under pull_request."
    required: false
    default: ""
  auto-approve:
    description: "When true, add -auto-approve for apply/destroy."
    required: false
    default: "false"
  emit-full-plan:
    description: "When true, include full plan output in the action summary."
    required: false
    default: "false"
  emit-summary:
    description: "When true, include a structured summary in the action summary for plan/apply."
    required: false
    default: "true"
  emit-raw-plan:
    description: "When true, include the raw plan output in the action summary."
    required: false
    default: "true"
  comment-section-id:
    description: "Section ID for the consolidated PR comment block (e.g. plan-123456789). When set, posts to a single consolidated comment instead of a standalone comment. Derived from working-directory slug when empty."
    required: false
    default: ""
  summary-max-lines:
    description: "Maximum diff lines per resource in the summary."
    required: false
    default: "80"
  outputs-display:
    description: "Display Terraform outputs: all, changes_only, or nothing."
    required: false
    default: "changes_only"
  git-modules-token:
    description: "Optional token for cloning private Terraform modules during init. When set, configures git credential helper before terraform init."
    required: false
    default: ""

outputs:
  plan_exit_code:
    description: "Exit code from terraform plan (0=clean,2=changes,1=error)."
    value: ${{ steps.plan.outputs.plan_exit_code }}
  plan_has_changes:
    description: "true when terraform plan detects changes."
    value: ${{ steps.plan.outputs.plan_has_changes }}
  plan_add:
    description: "Resources to add."
    value: ${{ steps.plan.outputs.plan_add }}
  plan_change:
    description: "Resources to change."
    value: ${{ steps.plan.outputs.plan_change }}
  plan_destroy:
    description: "Resources to destroy."
    value: ${{ steps.plan.outputs.plan_destroy }}
  plan_summary:
    description: "Plan summary string."
    value: ${{ steps.plan.outputs.plan_summary }}
  plan_file:
    description: "Absolute path to the plan file."
    value: ${{ steps.plan.outputs.plan_file }}
  plan_text_file:
    description: "Absolute path to the rendered plan text."
    value: ${{ steps.plan.outputs.plan_text_file }}
  plan_log_file:
    description: "Absolute path to the terraform plan log file."
    value: ${{ steps.plan.outputs.plan_log_file }}
  trace_file:
    description: "Absolute path to the Terraform trace log file (if generated)."
    value: ${{ steps.plan.outputs.trace_file }}
  plan_error_count:
    description: "Number of distinct Error: blocks detected in plan output."
    value: ${{ steps.plan.outputs.plan_error_count }}
  plan_error_file:
    description: "Path to file containing extracted plan errors."
    value: ${{ steps.plan.outputs.plan_error_file }}
  apply_exit_code:
    description: "Exit code from terraform apply."
    value: ${{ steps.apply.outputs.apply_exit_code }}
  apply_log_file:
    description: "Absolute path to the terraform apply log file."
    value: ${{ steps.apply.outputs.apply_log_file }}

runs:
  using: "composite"
  steps:
    - name: Install Terraform
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.terraform-version }}"

        if [ -z "$version" ] && command -v terraform >/dev/null 2>&1; then
          terraform -version
          exit 0
        fi

        if [ -z "$version" ]; then
          echo "Terraform not found and terraform-version not provided." >&2
          exit 1
        fi

        archive="terraform_${version}_linux_amd64.zip"
        url="https://releases.hashicorp.com/terraform/${version}/${archive}"
        curl -fsSLo "$archive" "$url"
        unzip -o "$archive" -d "$RUNNER_TEMP/terraform-bin"
        export PATH="$RUNNER_TEMP/terraform-bin:$PATH"
        echo "$RUNNER_TEMP/terraform-bin" >> "$GITHUB_PATH"
        terraform -version

    - name: Configure git for private modules
      if: ${{ inputs.git-modules-token != '' }}
      shell: bash
      env:
        GIT_MODULES_TOKEN: ${{ inputs.git-modules-token }}
      run: |
        git config --global url."https://x-access-token:${GIT_MODULES_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        terraform init -input=false -no-color ${{ inputs.init-args }}

    - name: Terraform fmt
      if: ${{ inputs.command == 'fmt' || inputs.run-fmt == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        terraform fmt -check ${{ inputs.fmt-args }}

    - name: Terraform validate (pre-plan)
      if: ${{ inputs.command == 'plan' && inputs.validate-on-plan == 'true' }}
      id: validate
      continue-on-error: true
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        log_file="${RUNNER_TEMP:-/tmp}/terraform-validate.log"
        set +e
        terraform validate -no-color ${{ inputs.validate-args }} 2>&1 | tee "$log_file"
        exit_code=${PIPESTATUS[0]}
        set -e
        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "log_file=$log_file" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Terraform validate
      if: ${{ (inputs.command == 'validate' || inputs.run-validate == 'true') && inputs.command != 'plan' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        terraform validate -no-color ${{ inputs.validate-args }}

    - name: Install Checkov
      if: ${{ inputs.command == 'plan' && inputs.checkov-enabled == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install checkov

    - name: Checkov scan
      if: ${{ inputs.command == 'plan' && inputs.checkov-enabled == 'true' }}
      id: checkov
      continue-on-error: true
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        log_file="${RUNNER_TEMP:-/tmp}/checkov.json"
        repo_root="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
        var_file="${{ inputs.checkov-var-file }}"
        var_path="${repo_root}/${var_file}"
        set +e
        if [ -n "$var_file" ] && [ -f "$var_path" ]; then
          checkov -d "$(pwd)" --framework "${{ inputs.checkov-framework }}" --output json --var-file "$var_path" > "$log_file"
        else
          checkov -d "$(pwd)" --framework "${{ inputs.checkov-framework }}" --output json > "$log_file"
        fi
        exit_code=$?
        set -e
        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "log_file=$log_file" >> "$GITHUB_OUTPUT"
        exit 0

    - name: Checkov gate
      if: ${{ inputs.command == 'plan' && inputs.checkov-enabled == 'true' }}
      id: checkov_gate
      shell: bash
      env:
        CHECKOV_JSON: ${{ steps.checkov.outputs.log_file }}
        FAIL_SEVERITIES: ${{ inputs.checkov-fail-severities }}
      run: |
        set -euo pipefail
        if [ -z "${CHECKOV_JSON:-}" ] || [ ! -f "$CHECKOV_JSON" ]; then
          echo "gate_failed=false" >> "$GITHUB_OUTPUT"
          echo "fail_severities=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        node <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require("fs");
        const path = process.env.CHECKOV_JSON;
        const failLevels = (process.env.FAIL_SEVERITIES || "")
          .split(",")
          .map((item) => item.trim().toUpperCase())
          .filter(Boolean);
        let data;
        try {
          data = JSON.parse(fs.readFileSync(path, "utf8"));
        } catch (error) {
          console.log("gate_failed=false");
          console.log("fail_severities=");
          process.exit(0);
        }
        const results = data && data.results ? data.results : data;
        const failed = Array.isArray(results.failed_checks) ? results.failed_checks : [];
        const matched = failed.filter((check) => {
          const raw = (check.severity || check.severity_level || "UNKNOWN");
          return failLevels.includes(String(raw).toUpperCase());
        });
        const gateFailed = matched.length > 0;
        process.stdout.write(`gate_failed=${gateFailed ? "true" : "false"}\n`);
        process.stdout.write(`fail_severities=${failLevels.join(",")}\n`);
        NODE

    - name: Terraform plan
      if: >-
        ${{ inputs.command == 'plan' &&
            (inputs.validate-on-plan != 'true' ||
             steps.validate.outputs.exit_code == '' ||
             steps.validate.outputs.exit_code == '0') }}
      id: plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        plan_file="$(pwd)/terraform.plan"
        plan_text_file="$(pwd)/terraform.plan.txt"
        plan_log_file="${RUNNER_TEMP:-/tmp}/terraform-plan.log"
        exit_code=0

        set +e
        terraform plan -no-color -input=false -detailed-exitcode -out="$plan_file" ${{ inputs.plan-args }} 2>&1 | tee "$plan_log_file"
        exit_code=${PIPESTATUS[0]}
        set -e

        has_changes="false"
        if [ "$exit_code" -eq 2 ]; then
          has_changes="true"
        fi

        add="0"
        change="0"
        destroy="0"

        if [ "$exit_code" -ne 1 ] && [ -f "$plan_file" ]; then
          terraform show -no-color "$plan_file" > "$plan_text_file"
          if command -v jq >/dev/null 2>&1; then
            counts=$(terraform show -json "$plan_file" | jq -r '
              [ .resource_changes[].change.actions ] | flatten
              | {
                  add: (map(select(. == "create")) | length),
                  change: (map(select(. == "update")) | length),
                  destroy: (map(select(. == "delete")) | length)
                }')
            add=$(jq -r '.add' <<< "$counts")
            change=$(jq -r '.change' <<< "$counts")
            destroy=$(jq -r '.destroy' <<< "$counts")
          fi
        fi

        summary="Add: ${add}, Change: ${change}, Destroy: ${destroy}"

        trace_file="${TF_LOG_PATH:-$RUNNER_TEMP/terraform-trace.log}"

        echo "plan_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "plan_has_changes=$has_changes" >> "$GITHUB_OUTPUT"
        echo "plan_add=$add" >> "$GITHUB_OUTPUT"
        echo "plan_change=$change" >> "$GITHUB_OUTPUT"
        echo "plan_destroy=$destroy" >> "$GITHUB_OUTPUT"
        echo "plan_summary=$summary" >> "$GITHUB_OUTPUT"
        echo "plan_file=$plan_file" >> "$GITHUB_OUTPUT"
        echo "plan_text_file=$plan_text_file" >> "$GITHUB_OUTPUT"
        echo "plan_log_file=$plan_log_file" >> "$GITHUB_OUTPUT"
        echo "trace_file=$trace_file" >> "$GITHUB_OUTPUT"

        # Extract structured errors from plan log â€” no expensive TRACE re-run
        error_count=0
        error_file="${RUNNER_TEMP:-/tmp}/terraform-plan-errors.txt"
        : > "$error_file"
        if [ "$exit_code" -eq 1 ] && [ -n "$plan_log_file" ] && [ -f "$plan_log_file" ]; then
          awk '
            BEGIN { in_error=0; block=""; count=0 }
            /^Error:/ {
              if (in_error && block != "") { print block; print ""; count++ }
              in_error=1; block=$0 "\n"; next
            }
            in_error && /^$/ { if (block != "") { print block; count++ }; in_error=0; block=""; next }
            in_error { block=block $0 "\n" }
            END { if (in_error && block != "") { print block; count++ }; print "##COUNT##" count }
          ' "$plan_log_file" > "$error_file" 2>/dev/null || true
          error_count=$(grep -o '##COUNT##[0-9]*' "$error_file" | grep -o '[0-9]*' || echo "0")
          sed -i '/##COUNT##/d' "$error_file" 2>/dev/null || true
          error_count="${error_count:-0}"
        fi

        echo "plan_error_count=$error_count" >> "$GITHUB_OUTPUT"
        echo "plan_error_file=$error_file" >> "$GITHUB_OUTPUT"

        exit 0

    - name: Terraform apply
      if: ${{ inputs.command == 'apply' }}
      id: apply
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        approve_flag=""
        if [ "${{ inputs.auto-approve }}" = "true" ]; then
          approve_flag="-auto-approve"
        fi
        apply_log_file="${RUNNER_TEMP:-/tmp}/terraform-apply.log"
        exit_code=0

        set +e
        terraform apply -no-color -input=false $approve_flag ${{ inputs.apply-args }} 2>&1 | tee "$apply_log_file"
        exit_code=${PIPESTATUS[0]}
        set -e

        echo "apply_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "apply_log_file=$apply_log_file" >> "$GITHUB_OUTPUT"

        exit "$exit_code"

    - name: Terraform summary
      if: ${{ always() && (inputs.command == 'plan' || inputs.command == 'apply') && inputs.emit-summary == 'true' }}
      id: summary
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND: ${{ inputs.command }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.plan_exit_code }}
        PLAN_HAS_CHANGES: ${{ steps.plan.outputs.plan_has_changes }}
        PLAN_ADD: ${{ steps.plan.outputs.plan_add }}
        PLAN_CHANGE: ${{ steps.plan.outputs.plan_change }}
        PLAN_DESTROY: ${{ steps.plan.outputs.plan_destroy }}
        PLAN_TEXT_FILE: ${{ steps.plan.outputs.plan_text_file }}
        PLAN_LOG_FILE: ${{ steps.plan.outputs.plan_log_file }}
        APPLY_OUTCOME: ${{ steps.apply.outcome }}
        APPLY_EXIT_CODE: ${{ steps.apply.outputs.apply_exit_code }}
        APPLY_LOG_FILE: ${{ steps.apply.outputs.apply_log_file }}
        VALIDATE_EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
        VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        VALIDATE_LOG_FILE: ${{ steps.validate.outputs.log_file }}
        CHECKOV_ENABLED: ${{ inputs.checkov-enabled }}
        VALIDATE_ON_PLAN: ${{ inputs.validate-on-plan }}
        CHECKOV_EXIT_CODE: ${{ steps.checkov.outputs.exit_code }}
        CHECKOV_OUTCOME: ${{ steps.checkov.outcome }}
        CHECKOV_LOG_FILE: ${{ steps.checkov.outputs.log_file }}
        CHECKOV_GATE_FAILED: ${{ steps.checkov_gate.outputs.gate_failed }}
        CHECKOV_GATE_SEVERITIES: ${{ steps.checkov_gate.outputs.fail_severities }}
        EMIT_RAW_PLAN: ${{ inputs.emit-raw-plan }}
        EMIT_FULL_PLAN: ${{ inputs.emit-full-plan }}
        SUMMARY_MAX_LINES: ${{ inputs.summary-max-lines }}
          COMMENT_SECTION_ID: ${{ inputs.comment-section-id }}
          PLAN_ERROR_FILE: ${{ steps.plan.outputs.plan_error_file }}
          PLAN_ERROR_COUNT: ${{ steps.plan.outputs.plan_error_count }}
      run: bash "${{ github.action_path }}/scripts/terraform-summary.sh"

    - name: Terraform PR comment
      if: ${{ always() && inputs.command == 'plan' && inputs.comment-on-pr == 'true' }}
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        COMMENT_FILE: ${{ steps.summary.outputs.comment_file }}
        COMMENT_MARKER: ${{ steps.summary.outputs.comment_marker }}
        PR_NUMBER: ${{ inputs.pr-number }}
      with:
        script: |
          const fs = require("fs");
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const prNumberInput = process.env.PR_NUMBER;
          let issue_number = null;
          let pr = null;
          if (prNumberInput) {
            issue_number = Number(prNumberInput);
          } else if (context.payload.pull_request) {
            pr = context.payload.pull_request;
            issue_number = pr.number;
          }
          if (!issue_number) {
            core.info("No PR context or PR number; skipping comment.");
            return;
          }

          if (!pr) {
            const response = await github.rest.pulls.get({ owner, repo, pull_number: issue_number });
            pr = response.data;
          }
          const isFork = pr.head.repo.full_name !== `${owner}/${repo}`;
          if (isFork) {
            core.info("Skipping PR comment for forked PR.");
            return;
          }

          const commentFile = process.env.COMMENT_FILE;
          if (!commentFile || !fs.existsSync(commentFile)) {
            core.info("Comment body file missing; skipping.");
            return;
          }

          const CONSOLIDATED_MARKER = "<!-- crosswave-terraform-report -->";
          const marker = process.env.COMMENT_MARKER || CONSOLIDATED_MARKER;
          const newContent = fs.readFileSync(commentFile, "utf8").trim();

          // Extract section from new content (between section tags) for targeted replacement
          const sectionOpenMatch = newContent.match(/<!-- section:([^>]+) -->/);
          const sectionId = sectionOpenMatch ? sectionOpenMatch[1] : null;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number, per_page: 100,
          });
          const existing = comments.find((c) => (c.body || "").includes(CONSOLIDATED_MARKER));

          let body;
          if (existing && sectionId) {
            // Section-based replacement: splice just this section into the existing comment
            const sectionOpen = `<!-- section:${sectionId} -->`;
            const sectionClose = `<!-- /section:${sectionId} -->`;

            // Extract the section content from the new content file
            const sectionOpenIdx = newContent.indexOf(sectionOpen);
            const sectionCloseIdx = newContent.indexOf(sectionClose);
            let sectionBlock;
            if (sectionOpenIdx !== -1 && sectionCloseIdx !== -1) {
              sectionBlock = newContent.slice(sectionOpenIdx, sectionCloseIdx + sectionClose.length);
            } else {
              sectionBlock = `${sectionOpen}\n${newContent}\n${sectionClose}`;
            }

            // Replace section in existing body
            const existingBody = existing.body || "";
            const existStartIdx = existingBody.indexOf(sectionOpen);
            const existEndIdx = existingBody.indexOf(sectionClose);

            let updatedBody;
            if (existStartIdx !== -1 && existEndIdx !== -1) {
              updatedBody = existingBody.slice(0, existStartIdx) + sectionBlock + existingBody.slice(existEndIdx + sectionClose.length);
            } else {
              // Append new section before any trailing content
              updatedBody = existingBody.trimEnd() + "\n\n" + sectionBlock;
            }

            // Update the timestamp line
            updatedBody = updatedBody.replace(
              /_Last updated:.*_/,
              `_Last updated: ${new Date().toUTCString()} by run [${context.runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})_`
            );

            body = updatedBody;
          } else if (existing) {
            // No section ID â€” full replacement of the comment
            body = newContent;
          } else {
            // No existing consolidated comment â€” create new
            body = newContent;
            if (!body.includes(CONSOLIDATED_MARKER)) {
              body = `${CONSOLIDATED_MARKER}\n${body}`;
            }
          }

          // Enforce GitHub 65536 char limit
          const MAX_BODY = 65000;
          if (body.length > MAX_BODY) {
            body = body.slice(0, MAX_BODY) + "\n\n_...comment truncated. See workflow logs for full output._";
          }

          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Fail if prechecks or plan failed
      if: ${{ always() && inputs.command == 'plan' }}
      shell: bash
      env:
        PLAN_EXIT_CODE: ${{ steps.plan.outputs.plan_exit_code }}
        VALIDATE_EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
        CHECKOV_GATE_FAILED: ${{ steps.checkov_gate.outputs.gate_failed }}
        CHECKOV_ENABLED: ${{ inputs.checkov-enabled }}
        VALIDATE_ON_PLAN: ${{ inputs.validate-on-plan }}
      run: |
        set -euo pipefail
        plan_exit="${PLAN_EXIT_CODE:-}"
        validate_exit="${VALIDATE_EXIT_CODE:-}"
        checkov_gate="${CHECKOV_GATE_FAILED:-false}"
        checkov_enabled="${CHECKOV_ENABLED:-false}"
        validate_on_plan="${VALIDATE_ON_PLAN:-true}"

        if [ "$validate_on_plan" = "true" ] && [ -n "$validate_exit" ] && [ "$validate_exit" != "0" ]; then
          echo "Terraform validate failed."
          exit 1
        fi

        if [ "$checkov_enabled" = "true" ] && [ "$checkov_gate" = "true" ]; then
          echo "Checkov findings exceeded configured thresholds."
          exit 1
        fi

        if [ "$plan_exit" = "1" ]; then
          echo "Terraform plan failed."
          exit 1
        fi

        exit 0

    - name: Terraform destroy
      if: ${{ inputs.command == 'destroy' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        approve_flag=""
        if [ "${{ inputs.auto-approve }}" = "true" ]; then
          approve_flag="-auto-approve"
        fi
        terraform destroy -no-color -input=false $approve_flag ${{ inputs.destroy-args }}
